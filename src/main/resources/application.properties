# Datasource - SQLite
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:./data/app.db

# Hibernate ORM
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# JWT verification
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://itsincom.it

# JWT signing
smallrye.jwt.sign.key.location=privateKey.pem

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true